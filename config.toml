# ── 期貨訂閱清單 ────────────────────────────────────────────────────
# category: Futures 下的分類名稱（如 TXF、MXF）
# id:       合約代碼（如 TXFR1 為近月連結期；TXF202506 為指定月份）
# name:     顯示用名稱
[[shioaji.futures]]
category = "MXF"
id       = "MXFR1"
name     = "小台指期近月"



# ── 股票訂閱清單 ────────────────────────────────────────────────────
# id:   股票代碼
# name: 顯示用名稱
